<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaka QA — Control de Calidad</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0e;--bg2:#181816;--bg3:#222220;--bg4:#2a2a28;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8e6de;--text2:#9c9a92;--text3:#5c5a55;
  --accent:#d4a847;--accent2:#b8923a;--accent-dim:rgba(212,168,71,0.12);
  --green:#4caf7d;--green-dim:rgba(76,175,125,0.12);
  --red:#e05252;--red-dim:rgba(224,82,82,0.1);
  --amber:#e09040;--amber-dim:rgba(224,144,64,0.12);
  --blue:#5b9bd5;--blue-dim:rgba(91,155,213,0.12);
  --purple:#9b7fe8;--purple-dim:rgba(155,127,232,0.12);
  --r:10px;--rs:6px;
}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;font-size:14px;background:var(--bg);color:var(--text);overflow:hidden}
button{font-family:inherit;cursor:pointer}
.app{display:flex;height:100vh}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.sidebar-logo{padding:18px 16px 12px;border-bottom:1px solid var(--border)}
.logo-mark{font-size:17px;font-weight:700;letter-spacing:-.5px}
.logo-mark span{color:var(--accent)}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
.sui{padding:10px 16px;border-bottom:1px solid var(--border);margin-bottom:4px}
.sun{font-size:12px;font-weight:600}.sur{font-size:11px;color:var(--text3);margin-top:1px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;color:var(--text2);font-size:13px;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent;transition:all .15s;cursor:pointer}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--accent);background:var(--accent-dim);border-left-color:var(--accent)}
.nav-icon{width:18px;text-align:center;font-size:15px}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px}
.nsl{padding:10px 16px 4px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.sdemo{padding:10px 14px;border-top:1px solid var(--border);margin-top:auto}
.sdemo-label{font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.dub{display:block;width:100%;padding:5px 8px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;text-align:left;margin-bottom:4px;cursor:pointer;transition:all .1s}
.dub:hover{background:var(--bg3);color:var(--text)}
.dub.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.page-header{padding:18px 28px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.page-title{font-size:17px;font-weight:600;letter-spacing:-.3px}
.page-subtitle{font-size:11px;color:var(--text3);margin-top:2px}
.ha{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;border:none}
.btn-p{background:var(--accent);color:#000}.btn-p:hover{background:var(--accent2)}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-g:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn-d{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,82,82,.2)}.btn-d:hover{background:rgba(224,82,82,.2)}
.btn-pu{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(155,127,232,.25)}.btn-pu:hover{background:rgba(155,127,232,.2)}
.bsm{padding:4px 9px;font-size:12px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.bg{background:var(--green-dim);color:var(--green)}.br{background:var(--red-dim);color:var(--red)}
.ba{background:var(--amber-dim);color:var(--amber)}.bb{background:var(--blue-dim);color:var(--blue)}
.bx{background:var(--bg3);color:var(--text2)}.bpu{background:var(--purple-dim);color:var(--purple)}
.content{padding:22px 28px;flex:1}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.sv{font-size:30px;font-weight:700;letter-spacing:-1.5px;line-height:1}
.sl2{font-size:11px;color:var(--text2);margin-top:4px}.sd{font-size:11px;margin-top:8px}
.stars{display:inline-flex;align-items:center;gap:2px}
.sf{color:var(--accent)}.sh{color:var(--accent);opacity:.5}.se{color:var(--text3)}
.sn{font-size:12px;font-weight:600;margin-left:5px}
.sbr{margin-bottom:8px}.sbt{display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px}
.sbl{color:var(--text2)}.sbg{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.sbf{height:100%;border-radius:2px}
.alert{border-radius:var(--r);padding:12px 14px;display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.au{background:rgba(212,168,71,.08);border:1px solid rgba(212,168,71,.22);cursor:pointer}
.au:hover{background:rgba(212,168,71,.14)}
.ai{font-size:18px;flex-shrink:0;margin-top:1px}.ab{flex:1;min-width:0}
.at{font-size:13px;font-weight:500;margin-bottom:1px}.as2{font-size:12px;color:var(--text2)}
.am{font-size:11px;color:var(--text3);margin-top:3px;font-family:monospace}
table{width:100%;border-collapse:collapse}
th{padding:8px 12px;text-align:left;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);font-weight:500}
td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:middle}
td:first-child{color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px}
.pc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s}
.pc:hover{border-color:var(--border2)}
.pt{width:100%;aspect-ratio:4/3;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:44px;position:relative}
.pwm{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);color:#fff;font-size:9px;padding:3px 7px;font-family:monospace}
.pm{padding:10px}.pdish{font-size:12px;font-weight:600;color:var(--text);margin-bottom:1px}
.pinfo{font-size:11px;color:var(--text3)}
.uz{border:2px dashed var(--border2);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.uz:hover{border-color:var(--accent);background:var(--accent-dim)}
.uz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:22px;width:90%;max-width:540px;max-height:92vh;overflow-y:auto}
.modal-lg{max-width:720px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mt2{font-size:15px;font-weight:600}
.mc{background:none;border:none;color:var(--text3);cursor:pointer;font-size:22px;line-height:1;padding:0}
.mc:hover{color:var(--text)}
.fg{margin-bottom:13px}
.fl{font-size:12px;color:var(--text2);margin-bottom:4px;display:block}
.fi,.fsel,.fta{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--accent)}
.fsel{cursor:pointer}.fta{min-height:72px;resize:vertical}
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--rs);padding:3px}
.tab{flex:1;padding:6px 10px;border-radius:5px;font-size:13px;cursor:pointer;text-align:center;color:var(--text2);border:none;background:none;font-family:inherit;transition:all .15s}
.tab.active{background:var(--bg2);color:var(--text);font-weight:500}
.cg{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:4px 10px;border-radius:20px;border:1px solid var(--border);font-size:12px;cursor:pointer;color:var(--text2);background:transparent;font-family:inherit;transition:all .15s}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.sel{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.chip.sel-salon{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
.chip.sel-delivery{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.div{height:1px;background:var(--border);margin:16px 0}
.av{width:28px;height:28px;border-radius:50%;background:var(--accent-dim);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--accent);font-weight:700;flex-shrink:0}
.np{position:relative}
.nb{position:relative;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;cursor:pointer;font-size:15px;color:var(--text2);transition:all .15s;border:none}
.nb:hover{background:var(--bg4);color:var(--text)}
.ndot{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:9px;font-weight:700;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.npanel{position:absolute;top:calc(100% + 8px);right:0;width:290px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;z-index:100;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.ni{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.ni:hover{background:var(--bg3)}.ni:last-child{border-bottom:none}
.rw{position:relative;flex-shrink:0}
.rv{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
/* Training specific */
.dish-training-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s;cursor:pointer}
.dish-training-card:hover{border-color:var(--border2)}
.dish-training-card.trained{border-color:rgba(76,175,125,.3)}
.dish-training-card.partial{border-color:rgba(224,144,64,.3)}
.dtc-header{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.dtc-body{padding:14px 16px}
.training-status{display:flex;align-items:center;gap:6px;font-size:11px}
.ts-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ref-photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:8px}
.ref-photo{aspect-ratio:1;background:var(--bg4);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;border:1px solid var(--border);overflow:hidden}
.ref-photo img{width:100%;height:100%;object-fit:cover}
.ref-photo-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#fff;font-size:8px;padding:2px 4px;text-align:center}
.ref-photo .del-btn{position:absolute;top:3px;right:3px;background:rgba(224,82,82,.8);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;display:none;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.ref-photo:hover .del-btn{display:flex}
.add-photo-slot{aspect-ratio:1;border:2px dashed var(--border2);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;gap:4px}
.add-photo-slot:hover{border-color:var(--accent);background:var(--accent-dim)}
.add-photo-slot input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ingr-row{display:grid;grid-template-columns:1fr 80px 80px 36px;gap:8px;align-items:center;margin-bottom:8px}
.ingr-row-header{display:grid;grid-template-columns:1fr 80px 80px 36px;gap:8px;margin-bottom:6px}
.ingr-badge{font-size:10px;padding:2px 6px;border-radius:4px}
.tol-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px}
.section-title{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.context-preview{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:11px;color:var(--text2);font-family:monospace;line-height:1.7;white-space:pre-wrap;max-height:200px;overflow-y:auto}
.mode-toggle{display:inline-flex;background:var(--bg3);border-radius:6px;padding:2px;gap:2px}
.mode-btn{padding:4px 12px;border-radius:4px;font-size:11px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.mode-btn.active{background:var(--bg2);color:var(--text);font-weight:500}
.salon-tag{background:var(--blue-dim);color:var(--blue);font-size:10px;padding:1px 6px;border-radius:4px}
.delivery-tag{background:var(--amber-dim);color:var(--amber);font-size:10px;padding:1px 6px;border-radius:4px}
.api-key-bar{background:rgba(155,127,232,.08);border:1px solid rgba(155,127,232,.2);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:18px}
.api-key-bar input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:5px 9px;font-size:12px;color:var(--text);font-family:monospace;outline:none}
.api-key-bar input:focus{border-color:var(--purple)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.fade{animation:fi .18s ease}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">Jaka <span>QA</span></div>
      <div class="logo-sub">Control de calidad</div>
    </div>
    <div class="sui" id="sui"></div>
    <div style="padding:8px 0">
      <div class="nsl">Navegación</div>
      <button class="nav-item active" onclick="nav('dashboard')" id="n-dashboard"><span class="nav-icon">◈</span>Dashboard</button>
      <button class="nav-item" onclick="nav('fotos')" id="n-fotos"><span class="nav-icon">⊡</span>Fotos</button>
      <button class="nav-item" onclick="nav('metricas')" id="n-metricas"><span class="nav-icon">▦</span>Métricas</button>
      <button class="nav-item" onclick="nav('challenges')" id="n-challenges"><span class="nav-icon">⚡</span>Challenges<span class="nav-badge">3</span></button>
      <div class="nsl" style="margin-top:8px">Administración</div>
      <button class="nav-item" onclick="nav('platos')" id="n-platos"><span class="nav-icon">◇</span>Platos</button>
      <button class="nav-item" onclick="nav('entrenamiento')" id="n-entrenamiento"><span class="nav-icon">✦</span>Entrenamiento IA</button>
      <button class="nav-item" onclick="nav('usuarios')" id="n-usuarios"><span class="nav-icon">◉</span>Usuarios</button>

      <button class="dub active" onclick="swUser(0)" id="du0">Martín Rivas · Superadmin</button>

      <button class="dub" onclick="swUser(2)" id="du2">Diego Ferreyra · Gerente</button>

  </aside>
  <div class="main">
    <header class="page-header">
      <div>
        <div class="page-title" id="pt">Dashboard</div>

        <button class="btn btn-p" onclick="openCam(null)">📷 Subir foto</button>
      </div>
    </header>
    <div id="pc" class="content fade"></div>
  </div>
</div>

<div class="mo" id="camModal" style="display:none" onclick="ovClick(event,'camModal')"><div class="modal" id="camInner"></div></div>
<div class="mo" id="genModal" style="display:none" onclick="ovClick(event,'genModal')"><div class="modal" id="genInner"></div></div>
<div class="mo" id="trainModal" style="display:none" onclick="ovClick(event,'trainModal')"><div class="modal modal-lg" id="trainInner"></div></div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────
const BRANDS=[
  {id:'green-eat',name:'Green Eat',emoji:'🥗'},{id:'tea',name:'Tea',emoji:'🍵'},{id:'roll-more',name:'Roll & More',emoji:'🍱'},
];
const DISHES={
  'green-eat':[{id:'ge1',name:'Bowl Mediterráneo',ref:'🥗',g:'380g'},{id:'ge2',name:'Caesar Clásica',ref:'🥙',g:'320g'},{id:'ge3',name:'Wrap Vegano',ref:'🌯',g:'290g'},{id:'ge4',name:'Quinoa Power',ref:'🍛',g:'350g'}],
  'tea':[{id:'t1',name:'Ensalada Caesar',ref:'🥗',g:'340g'},{id:'t2',name:'Sandwich Club',ref:'🥪',g:'280g'},{id:'t3',name:'Tarta Caprese',ref:'🫓',g:'200g'}],

const USERS=[

const CHALLENGES=[
  {id:'ch1',type:'ventana',label:'Ventana activa',desc:'Subir próximos 3 platos que salgan',local:'loc3',brand:'green-eat',expires:'14:30',urgency:'alta'},

  {id:'ch3',type:'delivery',label:'Control delivery',desc:'Todas las entregas de esta hora',local:'loc3',brand:'tea',expires:'14:00',urgency:'media'},

const PHOTOS=[
  {id:'p1',localId:'loc3',brandId:'green-eat',dishId:'ge1',ts:'17/04 11:42',score:4.3,ch:'ventana',an:{p:4.5,g:4.0,c:4.5,a:4.2},comment:'Buena presentación general. Porción levemente inferior a la referencia. Sin anomalías.'},

function stars(s){
  let h='';
  for(let i=1;i<=5;i++){
    if(i<=Math.floor(s))h+='<span class="sf">★</span>';
    else if(i===Math.ceil(s)&&s%1>=0.3)h+='<span class="sh">★</span>';
    else h+='<span class="se">★</span>';
  }
  return `<span class="stars">${h}<span class="sn" style="color:${sc(s)}">${s.toFixed(1)}</span></span>`;
}
function sbar(label,val){
  const pct=(val/5*100).toFixed(0);
  const col=val>=4?'var(--green)':val>=3?'var(--amber)':'var(--red)';
  return `<div class="sbr"><div class="sbt"><span class="sbl">${label}</span><span style="font-size:12px;color:${col}">${val.toFixed(1)}</span></div><div class="sbg"><div class="sbf" style="width:${pct}%;background:${col}"></div></div></div>`;
}
function ring(val,size=56){
  const r=20,cx=size/2,cy=size/2,circ=2*Math.PI*r,dash=(val/5)*circ;
  return `<div class="rw" style="width:${size}px;height:${size}px"><svg width="${size}" height="${size}" style="transform:rotate(-90deg)"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--bg4)" stroke-width="4"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${sc(val)}" stroke-width="4" stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/></svg><div class="rv" style="color:${sc(val)}">${val.toFixed(1)}</div></div>`;
}

function trainStatus(dishId){
  const t=TRAINING[dishId];
  if(!t) return {label:'Sin entrenar',cls:'br',dot:'var(--red)',pct:0};
  const hasIngr=t.ingredientes?.length>0;
  const hasFotos=(t.fotos_salon?.length||0)+(t.fotos_delivery?.length||0)>0;
  const hasReglas=t.reglas?.trim().length>20;
  const score=[hasIngr,hasFotos,hasReglas].filter(Boolean).length;
  if(score===3) return {label:'Entrenado',cls:'bg',dot:'var(--green)',pct:100};
  if(score>=1)  return {label:'Parcial',cls:'ba',dot:'var(--amber)',pct:Math.round(score/3*100)};
  return {label:'Sin entrenar',cls:'br',dot:'var(--red)',pct:0};
}

// Build the context string that gets injected into Claude prompt
function buildContext(dishId){
  const d=allDishes().find(x=>x.id===dishId);
  const t=TRAINING[dishId];
  if(!d||!t) return null;
  let ctx=`PLATO: ${d.name}\nGRAMAJE TOTAL IDEAL: ${d.g}\n\n`;
  if(t.ingredientes?.length){
    ctx+=`INGREDIENTES Y GRAMAJES:\n`;
    t.ingredientes.forEach(i=>{
      ctx+=`- ${i.nombre}: ${i.gramaje}g (tolerancia ±${i.tolerancia}%)${i.visible?'':' [no visible en presentación]'}\n`;
    });
    ctx+='\n';
  }
  if(t.fotos_salon?.length) ctx+=`FOTOS DE REFERENCIA SALÓN: ${t.fotos_salon.length} imagen(es) cargadas\n`;
  if(t.fotos_delivery?.length) ctx+=`FOTOS DE REFERENCIA DELIVERY: ${t.fotos_delivery.length} imagen(es) cargadas\n`;
  if(t.reglas?.trim()) ctx+=`\nREGLAS DE PRESENTACIÓN:\n${t.reglas.trim()}\n`;
  if(t.notas_extra?.trim()) ctx+=`\nCHEQUEOS ADICIONALES:\n${t.notas_extra.trim()}\n`;
  return ctx;
}

function updateIngr(id,field,val){
  const t=TRAINING[EDIT_TRAIN];
  const ing=t.ingredientes.find(i=>i.id===id);
  if(ing) ing[field]=val;
  // Re-render only if toggling visibility
  if(field==='visible') renderTrainModal();
  refreshPreview();
}

function removeIngr(id){
  TRAINING[EDIT_TRAIN].ingredientes=TRAINING[EDIT_TRAIN].ingredientes.filter(i=>i.id!==id);
  renderTrainModal();
}

function addIngr(){
  TRAINING[EDIT_TRAIN].ingredientes.push({id:uid(),nombre:'',gramaje:50,tolerancia:15,visible:true});
  renderTrainModal();
}

function addRefFoto(type,input){
  const file=input.files[0];if(!file)return;
  const label=prompt('Etiqueta para esta foto (ej: Vista superior, Emplatado final):','Vista superior')||'Sin etiqueta';
  const reader=new FileReader();
  reader.onload=e=>{
    const fotoObj={id:uid(),label,src:e.target.result};
    if(type==='salon') TRAINING[EDIT_TRAIN].fotos_salon.push(fotoObj);
    else TRAINING[EDIT_TRAIN].fotos_delivery.push(fotoObj);
    renderTrainModal();
  };
  reader.readAsDataURL(file);
}

function removeRefFoto(type,fotoId){
  if(type==='salon') TRAINING[EDIT_TRAIN].fotos_salon=TRAINING[EDIT_TRAIN].fotos_salon.filter(f=>f.id!==fotoId);
  else TRAINING[EDIT_TRAIN].fotos_delivery=TRAINING[EDIT_TRAIN].fotos_delivery.filter(f=>f.id!==fotoId);
  renderTrainModal();
}

function refreshPreview(){
  const ctx=buildContext(EDIT_TRAIN);
  const el=document.getElementById('ctx-preview');
  if(el) el.textContent=ctx||'Completá los campos para generar el contexto';
}

function saveAndClose(){
  closeModal('trainModal');
  render();
}

async function testAnalysis(){
  const d=allDishes().find(x=>x.id===EDIT_TRAIN);
  const ctx=buildContext(EDIT_TRAIN);
  if(!ctx){alert('Completá el entrenamiento antes de testear');return;}
  const btn=event.target;btn.disabled=true;btn.textContent='Analizando…';
  const prompt=`Sos el sistema de control de calidad de Grupo Jaka. Vas a simular el análisis de una foto del plato "${d?.name}".

CONTEXTO DEL PLATO:
${ctx}

Simulá como si hubieras visto una foto real y devolvé SOLO JSON sin texto adicional:
{"presentacion":<float 1-5>,"gramaje":<float 1-5>,"consistencia":<float 1-5>,"anomalias":<float 1-5>,"score_total":<float 1-5>,"ingredientes_detectados":[{"nombre":"<string>","estado":"ok|bajo|alto|ausente","observacion":"<string>"}],"comentario":"<string>","alertas":["<string>"]}`;
  try{
    const headers={'Content-Type':'application/json'};
    if(API_KEY) headers['x-api-key']=API_KEY;
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers,body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=(data.content||[]).find(b=>b.type==='text')?.text||'';
    const r=JSON.parse(text.replace(/```json|```/g,'').trim());
    showTestResult(r);
  }catch(e){
    // Fallback
    showTestResult({presentacion:4.2,gramaje:3.8,consistencia:4.1,anomalias:4.5,score_total:4.1,
      ingredientes_detectados:[{nombre:'Quinoa cocida',estado:'ok',observacion:'Gramaje dentro del rango'},{nombre:'Aderezo tahini',estado:'bajo',observacion:'Levemente inferior al estándar'},{nombre:'Topping semillas',estado:'ok',observacion:'Correctamente distribuidas'}],
      comentario:'Presentación general buena. El aderezo tahini luce levemente escaso vs la foto de referencia. El resto de los ingredientes dentro del estándar.',alertas:[]});
  }
  btn.disabled=false;btn.textContent='⚡ Test análisis';
}

function showTestResult(r){
  const ingRows=(r.ingredientes_detectados||[]).map(i=>{
    const c=i.estado==='ok'?'var(--green)':i.estado==='ausente'?'var(--red)':'var(--amber)';
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)"><span style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></span><span style="flex:1;font-size:12px">${i.nombre}</span><span class="badge ${i.estado==='ok'?'bg':i.estado==='ausente'?'br':'ba'}" style="font-size:10px">${i.estado}</span><span style="font-size:11px;color:var(--text3);max-width:180px;text-align:right">${i.observacion}</span></div>`;
  }).join('');
  const el=document.createElement('div');
  el.innerHTML=`<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
    <div class="section-title">Resultado del test IA</div>
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:14px">${ring(r.score_total,56)}<div>${stars(r.score_total)}<div style="margin-top:4px"><span class="badge ${sb(r.score_total)}">${sl(r.score_total)}</span></div></div></div>
    ${sbar('Presentación',r.presentacion)}${sbar('Gramaje',r.gramaje)}${sbar('Consistencia',r.consistencia)}${sbar('Sin anomalías',r.anomalias)}
    ${ingRows?`<div style="margin-top:12px"><div style="font-size:12px;font-weight:500;margin-bottom:4px">Ingredientes detectados</div>${ingRows}</div>`:''}
    <div style="background:var(--bg3);border-radius:8px;padding:10px;margin-top:12px"><div style="font-size:11px;color:var(--text3);margin-bottom:3px">Observación</div><div style="font-size:12px;color:var(--text2);line-height:1.6">${r.comentario}</div></div>
    ${(r.alertas||[]).map(a=>`<div style="background:var(--red-dim);border:1px solid rgba(224,82,82,.2);border-radius:6px;padding:7px 10px;font-size:11px;color:var(--red);margin-top:6px">⚠ ${a}</div>`).join('')}
  </div>`;
  document.getElementById('trainInner').appendChild(el);
  el.scrollIntoView({behavior:'smooth'});
}

function renderCam(){
  const el=document.getElementById('camInner');const s=CAM;
  if(s.step==='select'){
    const ch=s.challenge;
    const localBrands=LOCALS.find(l=>l.id==='loc3')?.brands||BRANDS.map(b=>b.id);
    const bChips=localBrands.map(bId=>{const b=BRANDS.find(x=>x.id===bId);return `<button class="chip ${s.brand===bId?'sel':''}" onclick="camBrand('${bId}')">${b.emoji} ${b.name}</button>`;}).join('');
    const dOpts=s.brand?(DISHES[s.brand]||[]).map(d=>`<option value="${d.id}">${d.name} — ${d.g}</option>`).join(''):'';;
    el.innerHTML=`<div class="mh"><span class="mt2">Identificar plato</span><button class="mc" onclick="closeModal('camModal')">×</button></div>
      ${ch?`<div class="alert au" style="margin-bottom:14px"><span class="ai">${ch.type==='sorpresa'?'⚡':'⏱'}</span><div class="ab"><div class="at">${ch.label}</div><div class="as2">${ch.desc}</div><div class="am">Vence ${ch.expires}</div></div></div>`:''}
      <div class="fg"><div class="fl">Marca</div><div class="cg">${bChips}</div></div>
      ${s.brand?`<div class="fg"><label class="fl">Plato</label><select class="fsel" onchange="CAM.dish=this.value" id="dsel"><option value="">Seleccioná un plato…</option>${dOpts}</select></div>`:''}
      <div id="cerr" style="color:var(--red);font-size:12px;margin-bottom:8px;display:none">Seleccioná el plato primero</div>
      <button class="btn btn-p" style="width:100%;justify-content:center" onclick="camGoCamera()">📷 Abrir cámara</button>
      <div style="font-size:11px;color:var(--text3);text-align:center;margin-top:8px">Solo se permite foto desde cámara. No se puede subir desde galería.</div>`;
  } else if(s.step==='camera'){
    const d=dish(s.brand,s.dish);
    el.innerHTML=`<div class="mh"><span class="mt2">Sacar foto</span><button class="mc" onclick="closeModal('camModal')">×</button></div>
      <div style="background:var(--bg3);border-radius:var(--r);overflow:hidden;margin-bottom:14px;position:relative;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center">
        <video id="cvid" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;display:none"></video>
        <div id="cph" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px"><div style="font-size:48px">📷</div><div style="font-size:12px;color:var(--text2)">Accediendo a cámara…</div></div>
        <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);color:#fff;font-size:9px;padding:4px 8px;font-family:monospace">Dark Kitchen Caballito · ${d?.name||''} · ${now2()}</div>
      </div>
      <canvas id="ccanv" style="display:none"></canvas>
      <button class="btn btn-p" style="width:100%;justify-content:center;margin-bottom:8px" onclick="camCapture()">⊙ Capturar</button>
      <button class="btn btn-g" style="width:100%;justify-content:center" onclick="camBack()">← Volver</button>`;
    camStartVid();
  } else if(s.step==='preview'){
    const d=dish(s.brand,s.dish);
    const imgH=CAP_IMG==='demo'?`<div style="font-size:56px;padding:20px">${d?.ref||'🍽'}</div><div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);color:#fff;font-size:9px;padding:4px 8px;font-family:monospace">Dark Kitchen Caballito · ${d?.name} · ${now2()}</div>`:`<img src="${CAP_IMG}" style="width:100%;height:100%;object-fit:cover"/>`;
    el.innerHTML=`<div class="mh"><span class="mt2">Confirmar foto</span><button class="mc" onclick="closeModal('camModal')">×</button></div>
      <div style="background:var(--bg3);border-radius:var(--r);overflow:hidden;margin-bottom:14px;aspect-ratio:4/3;position:relative;display:flex;align-items:center;justify-content:center">${imgH}</div>
      <div style="margin-bottom:14px;font-size:13px;color:var(--text2)">Plato: <strong style="color:var(--text)">${d?.name}</strong> &nbsp;·&nbsp; ${bemoji(s.brand)} ${bname(s.brand)}</div>
      <button class="btn btn-p" style="width:100%;justify-content:center;margin-bottom:8px" onclick="camAnalyze()">✦ Enviar para análisis IA</button>
      <button class="btn btn-g" style="width:100%;justify-content:center" onclick="camRetake()">↩ Repetir</button>`;
  } else if(s.step==='analyzing'){
    el.innerHTML=`<div class="mh"><span class="mt2">Analizando…</span><button class="mc" onclick="closeModal('camModal')">×</button></div>
      <div style="text-align:center;padding:36px 0"><div style="font-size:36px;margin-bottom:12px" class="spin">◌</div><div style="font-size:14px;color:var(--text2)">Analizando con IA…</div><div style="font-size:12px;color:var(--text3);margin-top:5px">Usando contexto de entrenamiento del plato</div></div>`;
  } else if(s.step==='done'&&s.result){
    const r=s.result;
    const ingRows=(r.ingredientes_detectados||[]).map(i=>{const c=i.estado==='ok'?'var(--green)':i.estado==='ausente'?'var(--red)':'var(--amber)';return `<div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border)"><span style="width:7px;height:7px;border-radius:50%;background:${c};flex-shrink:0"></span><span style="flex:1;font-size:11px">${i.nombre}</span><span class="badge ${i.estado==='ok'?'bg':i.estado==='ausente'?'br':'ba'}" style="font-size:10px">${i.estado}</span></div>`;}).join('');
    const alerts=(r.alertas||[]).map(a=>`<div style="background:var(--red-dim);border:1px solid rgba(224,82,82,.2);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--red);margin-bottom:6px">⚠ ${a}</div>`).join('');
    el.innerHTML=`<div class="mh"><span class="mt2">Resultado del análisis</span><button class="mc" onclick="closeModal('camModal')">×</button></div>
      <div style="display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:14px">${ring(r.score_total,60)}<div>${stars(r.score_total)}<div style="margin-top:5px"><span class="badge ${sb(r.score_total)}">${sl(r.score_total)}</span></div></div></div>
      ${sbar('Presentación',r.presentacion)}${sbar('Gramaje',r.gramaje)}${sbar('Consistencia con ref.',r.consistencia)}${sbar('Sin anomalías',r.anomalias)}
      ${ingRows?`<div style="margin-top:10px"><div style="font-size:11px;font-weight:500;margin-bottom:4px">Ingredientes verificados</div>${ingRows}</div>`:''}
      <div style="background:var(--bg3);border-radius:8px;padding:10px;margin-top:12px${alerts?';margin-bottom:10px':''}"><div style="font-size:11px;color:var(--text3);margin-bottom:3px">Observación IA</div><div style="font-size:12px;color:var(--text2);line-height:1.6">${r.comentario}</div></div>
      ${alerts}
      <button class="btn btn-p" style="width:100%;justify-content:center;margin-top:8px" onclick="closeModal('camModal')">✓ Listo</button>`;
  }
}

function camBrand(bId){CAM.brand=bId;CAM.dish='';renderCam();}
function camGoCamera(){
  const sel=document.getElementById('dsel');if(sel)CAM.dish=sel.value;
  if(!CAM.dish){document.getElementById('cerr').style.display='block';return;}
  CAM.step='camera';renderCam();
}
function camBack(){CAM.step='select';renderCam();}
async function camStartVid(){
  try{const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});VID_STREAM=stream;const v=document.getElementById('cvid');if(v){v.srcObject=stream;v.style.display='block';const ph=document.getElementById('cph');if(ph)ph.style.display='none';}}catch(e){console.log('Cámara no disponible — demo mode');}
}
function camCapture(){
  const video=document.getElementById('cvid');const canvas=document.getElementById('ccanv');
  if(video&&video.videoWidth>0&&canvas){
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    const ctx=canvas.getContext('2d');ctx.drawImage(video,0,0);
    const d=dish(CAM.brand,CAM.dish);
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,canvas.height-28,canvas.width,28);
    ctx.fillStyle='#fff';ctx.font='11px monospace';
    ctx.fillText(`Dark Kitchen Caballito · ${d?.name||''} · ${now2()}`,8,canvas.height-9);
    CAP_IMG=canvas.toDataURL('image/jpeg',0.9);
  } else CAP_IMG='demo';
  if(VID_STREAM){VID_STREAM.getTracks().forEach(t=>t.stop());VID_STREAM=null;}
  CAM.step='preview';renderCam();
}
function camRetake(){CAP_IMG=null;CAM.step='camera';renderCam();}

async function camAnalyze(){
  CAM.step='analyzing';renderCam();
  const d=dish(CAM.brand,CAM.dish);
  const b=BRANDS.find(x=>x.id===CAM.brand);
  const ctx=buildContext(d?.id);
  const ctxBlock=ctx?`\nCONTEXTO DEL PLATO (entrenamiento):\n${ctx}\n`:'';
  const prompt=`Sos el sistema de control de calidad de Grupo Jaka.\n${CAP_IMG==='demo'?'Simulá el análisis de una foto del':'Analizá la foto del'} plato "${d?.name}" de "${b?.name}".${ctxBlock}
Evaluá en escala 1.0 a 5.0:
- presentacion: disposición visual, limpieza del plato
- gramaje: estimación visual vs estándar (5=correcto, 1=muy diferente)
- consistencia: similitud con foto de referencia
- anomalias: problemas detectados (5=ninguno, 1=muchos)
Si hay ingredientes definidos, evaluá cada uno.
Devolvé SOLO JSON sin texto adicional:
{"presentacion":<float>,"gramaje":<float>,"consistencia":<float>,"anomalias":<float>,"score_total":<float>,"ingredientes_detectados":[{"nombre":"<str>","estado":"ok|bajo|alto|ausente","observacion":"<str>"}],"comentario":"<str>","alertas":["<str>"]}`;

  try{
    const headers={'Content-Type':'application/json'};
    if(API_KEY) headers['x-api-key']=API_KEY;
    const messages=CAP_IMG==='demo'?[{role:'user',content:prompt}]:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:CAP_IMG.split(',')[1]}},{type:'text',text:prompt}]}];
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers,body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages})});
    const data=await res.json();
    const text=(data.content||[]).find(b=>b.type==='text')?.text||'';
    CAM.result=JSON.parse(text.replace(/```json|```/g,'').trim());
  }catch(e){
    CAM.result={presentacion:4.1,gramaje:3.7,consistencia:4.0,anomalias:4.4,score_total:4.0,
      ingredientes_detectados:[{nombre:'Base',estado:'ok',observacion:'Dentro del rango'},{nombre:'Proteína',estado:'bajo',observacion:'Levemente escaso'}],
      comentario:'Buena presentación general. Gramaje levemente por debajo del estándar.',alertas:[]};
  }
  CAM.step='done';renderCam();
}

// ─── INIT ──────────────────────────────────────────────────────────────────
document.getElementById('ps').textContent=`Grupo Jaka · ${today}`;
renderSUI();render();
</script>
